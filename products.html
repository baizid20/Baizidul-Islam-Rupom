<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8" />
  <title>Baizidul Islam-Rupom — Frontend Alchemist Turning pixels into client success stories</title>
  <link rel="stylesheet" href="style/style.css" />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="shortcut icon" href="assets/" type="image/x-icon" />
</head>
<body class="relative min-h-screen">

  <!-- Background Image setup zone -->
  <div id="vanta-bg"></div>
  <div class="content"></div>

  <!-- Vanta.js এর প্রয়োজনীয় স্ক্রিপ্ট লিংক -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta/dist/vanta.dots.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/vanta/dist/vanta.globe.min.js"></script>

  <!-- header start -->
  <header>
    <nav class="">
      <!-- navbar profile image -->
      <div id="profile" class="w-20 h-20 rounded-full border-4 border-white">
        <img class="w-full h-full rounded-full object-cover" src="assets/Untitled design.png" alt="Baizidul Islam-Rupom" />
      </div>

      <!-- navs -->
      <div>
        <ul>
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About</a></li>
          <li><a href="#projects">Projects</a></li>
          <li><a href="blog.html">Blog</a></li>
          <li><a href="products.html">Products</a></li>
        </ul>
      </div>

      <div>
        <li><a href="services.html">Services</a></li>
      </div>

      <!-- 🔵 Theme Toggle Icons -->
      <div class="flex gap-4 items-center">
        <!-- Moon icon (initially visible) -->
        <svg id="moon" class="h-10 w-10 cursor-pointer" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white">
          <path
            d="M21.64,13a1,1,0,0,0-1.05-.14A8.05,8.05,0,0,1,17.22,13,8.15,8.15,0,0,1,9.08,5.49a8.59,8.59,0,0,1,.25-2A1,1,0,0,0,8,2.36,10.14,10.14,0,1,0,22,14.05,1,1,0,0,0,21.64,13Z"
          />
        </svg>

        <!-- Sun icon (initially hidden) -->
        <svg id="sun" class="h-10 w-10 cursor-pointer hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="orange">
          <path
            d="M12,4A1,1,0,0,1,13,3V2a1,1,0,0,0-2,0V3A1,1,0,0,1,12,4Zm6.36,1.64a1,1,0,0,1,0,1.41L17.66,8a1,1,0,1,1-1.41-1.41l.71-.71A1,1,0,0,1,18.36,5.64ZM21,11h-1a1,1,0,0,1,0-2h1a1,1,0,0,1,0,2Zm-9,8a1,1,0,0,1-1,1v1a1,1,0,0,0,2,0V20A1,1,0,0,1,12,19Zm6.36-1.64a1,1,0,1,1-1.41,1.41l-.71-.71A1,1,0,1,1,17.66,17.36ZM12,18a6,6,0,1,0-6-6A6,6,0,0,0,12,18Z"
          />
        </svg>
      </div>
    </nav>
  </header>

  <script>
    const moon = document.getElementById('moon');
    const sun = document.getElementById('sun');

    let vantaEffect = null;
    let currentTheme = 'night';

    function loadNightTheme() {
      if (vantaEffect) vantaEffect.destroy();

      vantaEffect = VANTA.DOTS({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        color: 0xffffff,
        backgroundColor: 0x0d0d0d,
      });

      moon.classList.add("hidden");
      sun.classList.remove("hidden");
      currentTheme = "night";
    }

    function loadDayTheme() {
      if (vantaEffect) vantaEffect.destroy();

      vantaEffect = VANTA.GLOBE({
        el: "#vanta-bg",
        mouseControls: true,
        touchControls: true,
        minHeight: 200.0,
        minWidth: 200.0,
        scale: 1.0,
        scaleMobile: 1.0,
        color: 0x3366ff,
        backgroundColor: 0xffffff,
        size: 1.1,
      });

      sun.classList.add("hidden");
      moon.classList.remove("hidden");
      currentTheme = "day";
    }

    // ক্লিক ইভেন্টগুলো দিয়ে থিম টগল করো
    moon.addEventListener("click", loadDayTheme);
    sun.addEventListener("click", loadNightTheme);

    // প্রথমে নাইট থিম চালু করো
    loadNightTheme();
  </script>
  <script src="index.js"></script>
</body>
</html>
