<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
    <title>Baizidul Islam-Rupom —  Frontend Alchemist Turning pixels into client success stories</title>
  <link rel="stylesheet" href="style/style.css">
  <link rel="shortcut icon" href="assets/" type="image/x-icon">
</head>
<body>
  <div id="vanta-bg"></div>
  <div class="content">
    <h1></h1>
  </div>

  <!-- Vanta.js এর প্রয়োজনীয় স্ক্রিপ্ট লিংক -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r121/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/vanta@latest/dist/vanta.dots.min.js"></script>

  <!-- Vanta effect চালু করার কোড -->
  <script>
    VANTA.DOTS({
      el: "#vanta-bg",
      mouseControls: true,
      touchControls: true,
      minHeight: 200.00,
      minWidth: 200.00,
      scale: 1.00,
      scaleMobile: 1.00,
      color: 0xffffff,
      backgroundColor: 0x000000
    });
  </script>
</body>
</html>
